name: arrusted-symphony
image: arrusted/symphony
size: m
repository:
  disabled: true
integrations:
  github:
    share_auth: true
sessions:
  - name: symphony
    command: >-
      sh -lc 'sudo mkdir -p /.namespace/tasks && sudo touch /.namespace/tasks/symphony;
      if ! test -f /workspaces/arrusted-development/WORKFLOW.md; then
      until GIT_TERMINAL_PROMPT=0 git clone https://github.com/withAutograph/arrusted-development.git /workspaces/arrusted-development; do
      sudo rm -rf /workspaces/arrusted-development; sleep 2;
      done;
      fi;
      git config --global url.https://github.com/.insteadOf git@github.com:;
      printenv OPENAI_API_KEY | codex login --with-api-key >/dev/null;
      cd /workspaces/arrusted-development;
      exec /usr/local/bin/container-entrypoint'
env:
  - name: LINEAR_API_KEY
    from_secret_id: REPLACE_WITH_LINEAR_SECRET_ID
  - name: OPENAI_API_KEY
    from_secret_id: REPLACE_WITH_OPENAI_SECRET_ID
