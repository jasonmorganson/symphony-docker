name: arrusted-symphony
image: arrusted/symphony
size: m
sessions:
  - name: symphony
    command: >-
      sh -lc 'sudo mkdir -p /.namespace/tasks && sudo touch /.namespace/tasks/symphony;
      if ! test -f /workspaces/arrusted-development/WORKFLOW.md; then
      sudo rm -rf /workspaces/arrusted-development;
      git clone https://github.com/withAutograph/arrusted-development.git /workspaces/arrusted-development;
      fi;
      cd /workspaces/arrusted-development;
      exec /usr/local/bin/container-entrypoint'
env:
  - name: LINEAR_API_KEY
    from_secret_id: REPLACE_WITH_LINEAR_SECRET_ID
  - name: OPENAI_API_KEY
    from_secret_id: REPLACE_WITH_OPENAI_SECRET_ID
