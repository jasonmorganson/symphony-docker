services:
  symphony:
    image: symphony-docker:latest
    build:
      context: .
    container_name: symphony
    restart: unless-stopped
    env_file:
      - /etc/symphony/runtime.env
    volumes:
      - /srv/symphony/workspaces:/workspaces
    ports:
      - "127.0.0.1:4410:4410"
    logging:
      driver: local
      options:
        max-size: 20m
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:4410/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    stop_grace_period: 30s
